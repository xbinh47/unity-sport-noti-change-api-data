<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xG Leaderboard</title>
  </head>
  <body>
    <div id="app">
      <header class="hero">
        <div class="hero-icon">📊</div>
        <div>
          <h1>xG Leaderboard</h1>
          <p class="sub">Enter a match ID → Check. Live matches auto-refresh every 20s.</p>
        </div>
        <a href="/" class="back-btn">← Poller</a>
      </header>

      <section class="card add-card">
        <div class="add-row">
          <div class="env-wrap">
            <div class="seg" id="envSeg">
              <button class="seg-btn active" data-env="staging">staging</button>
              <button class="seg-btn" data-env="prod">prod</button>
            </div>
          </div>
          <input id="matchInput" type="text" placeholder="Event ID e.g. o8tzjgln1jjlw47" autocomplete="off" spellcheck="false" />
          <button class="btn primary" id="checkBtn">Check</button>
        </div>
      </section>

      <div id="panels"></div>
    </div>
    <script type="module" src="/src/xg.js"></script>
  </body>
</html>
