<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>WC Replay — Argentina v Spain</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --grass:#1f7a4d; --grass-dk:#186340; --line:rgba(255,255,255,.55);
  --home:#7fb8ff; --away:#f60123;
  --bg:#0c1512; --panel:#12201b; --panel-2:#0e1a16; --ink:#eaf3ee;
  --muted:#8fa89c; --gold:#f5c542; --edge:rgba(255,255,255,.09);
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
:root[data-theme=light]{
  --bg:#eef2ee; --panel:#ffffff; --panel-2:#f4f7f4; --ink:#12201b;
  --muted:#5c6f65; --edge:rgba(0,0,0,.1); --line:rgba(255,255,255,.7);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
  -webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:18px 18px 40px;
  display:grid;grid-template-columns:1fr 340px;grid-template-rows:auto auto auto;
  gap:14px}
header{grid-column:1/-1;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.title{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.score{display:flex;align-items:center;gap:14px;font-variant-numeric:tabular-nums}
.team{display:flex;align-items:center;gap:8px;font-weight:650;font-size:15px}
.dot{width:11px;height:11px;border-radius:50%;box-shadow:0 0 0 2px rgba(0,0,0,.25)}
.home .dot{background:var(--home)} .away .dot{background:var(--away)}
.sc{font-family:var(--mono);font-size:30px;font-weight:700;letter-spacing:.02em;
  padding:0 6px}
.clock{margin-left:auto;font-family:var(--mono);font-size:15px;color:var(--muted);
  display:flex;gap:10px;align-items:center}
.badge{background:var(--panel);border:1px solid var(--edge);border-radius:6px;
  padding:3px 9px;font-family:var(--mono);font-size:12px}
.pitch-card{grid-column:1;background:var(--panel);border:1px solid var(--edge);
  border-radius:12px;padding:12px;position:relative;overflow:hidden}
canvas{width:100%;height:auto;display:block;border-radius:6px}
.feed{grid-column:2;grid-row:2/4;background:var(--panel);border:1px solid var(--edge);
  border-radius:12px;display:flex;flex-direction:column;min-height:0;max-height:640px}
.feed h2{margin:0;padding:12px 14px;font-size:12px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--edge)}
.log{overflow-y:auto;padding:6px 0;flex:1}
.ev{display:grid;grid-template-columns:44px 1fr;gap:8px;padding:6px 14px;
  font-size:13px;border-left:3px solid transparent}
.ev .mn{font-family:var(--mono);color:var(--muted);font-size:12px}
.ev.h{border-left-color:var(--home)} .ev.a{border-left-color:var(--away)}
.ev.key{background:rgba(245,197,66,.08)}
.ev.def{border-left-color:#ff8c42} .ev.def .lab{color:#ff8c42}
.log.hide-def .ev.def{display:none}
.ev .lab{font-weight:600}.ev .pl{color:var(--muted);font-size:12px}
.ev.now{background:rgba(127,184,255,.12)}
.controls{grid-column:1/-1;background:var(--panel);border:1px solid var(--edge);
  border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;
  flex-wrap:wrap}
button{font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;
  background:var(--panel-2);color:var(--ink);border:1px solid var(--edge);
  border-radius:8px;padding:8px 16px}
button:hover{border-color:var(--muted)}
button.play{background:var(--home);color:#04121f;border-color:transparent;min-width:92px}
:root[data-theme=light] button.play{color:#fff}
.seekwrap{flex:1;min-width:200px;position:relative}
.ticks{position:relative;height:12px;margin-bottom:2px}
.ticks i{position:absolute;top:2px;width:3px;height:9px;border-radius:1px;transform:translateX(-50%)}
.tk-goal{background:var(--gold);height:12px!important;top:0!important;width:4px!important}
.tk-shot{background:var(--muted)} .tk-card{background:var(--away)}
.tk-corner{background:var(--home);opacity:.6}
.seek{width:100%;accent-color:var(--home)}
.spd{display:flex;gap:6px;align-items:center}
.spd button{padding:6px 10px;font-family:var(--mono);font-size:12px}
.spd button.on{background:var(--home);color:#04121f;border-color:transparent}
.spd select{font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;
  background:var(--panel-2);color:var(--ink);border:1px solid var(--edge);
  border-radius:8px;padding:8px 10px}
.spd select:hover{border-color:var(--muted)}
.cur{font-family:var(--mono);font-size:13px;color:var(--muted);min-width:60px}
:focus-visible{outline:2px solid var(--home);outline-offset:2px}
@media (max-width:880px){.wrap{grid-template-columns:1fr}
  .pitch-card,.feed,.controls{grid-column:1}.feed{grid-row:auto;max-height:320px}}
</style>

const PERIOD = {"1": "1H", "2": "2H", "3": "ET1", "4": "ET2", "14": "PENS", "16": "PRE"};
const KEY = new Set([114,116,117,121,122,123,115,137,153,135,166]); // goal/card/shot/sub/corner/offside/freekick/injury/blocked-shot
const DEF = new Set([161,162,163,164,165]); // tackle/intercept/clearance/block/dispossess
let showDef = true;
const cv = document.getElementById('cv'), g = cv.getContext('2d');
const W = cv.width, H = cv.height, PAD = 30;
const pw = W - PAD*2, ph = H - PAD*2;
// pitch x = length 0..100 (defensive->attacking), y = width 0..100
function px(x){ return PAD + x/100*pw; }
function py(y){ return PAD + (100-y)/100*ph; }
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

function drawPitch(){
  g.fillStyle = getCss('--grass'); g.fillRect(0,0,W,H);
  // stripes
  g.fillStyle = getCss('--grass-dk');
  for(let i=0;i<10;i+=2){ g.fillRect(PAD+i/10*pw,PAD,pw/10,ph); }
  g.strokeStyle = getCss('--line'); g.lineWidth = 2;
  g.strokeRect(PAD,PAD,pw,ph);
  g.beginPath(); g.moveTo(PAD+pw/2,PAD); g.lineTo(PAD+pw/2,PAD+ph); g.stroke();
  g.beginPath(); g.arc(PAD+pw/2,PAD+ph/2,ph*0.15,0,7); g.stroke();
  // boxes
  const bh=ph*0.6, by=PAD+(ph-bh)/2, bw=pw*0.16;
  g.strokeRect(PAD,by,bw,bh); g.strokeRect(PAD+pw-bw,by,bw,bh);
  const gh=ph*0.28, gy=PAD+(ph-gh)/2, gw=pw*0.055;
  g.strokeRect(PAD,gy,gw,gh); g.strokeRect(PAD+pw-gw,gy,gw,gh);
}
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

// dead-ball / stoppage events: ball out of open play -> BREAK the trail here,
// don't draw a line teleporting across the pitch to the restart spot.
const DEAD = new Set([114,115,116,117,118,119,123,133,134,135,137,153,154,157,166]);
// break between consecutive events j-1 -> j (dead-ball / off-ball / possession flip)
function brk(a,b){ return DEAD.has(a.c)||DEAD.has(b.c)||a.np||b.np||a.ta!==b.ta; }
let trail = [];
function render(i){
  drawPitch();
  const e = EV[i];
  // trail = last few touches of current pha only. cap segments short so UI stays clean.
  const MAXSEG=6;
  let start=i;
  while(start>0 && (i-start)<MAXSEG && !brk(EV[start-1],EV[start])) start--;
  trail = EV.slice(start, i+1);
  g.lineWidth = 2.5; g.lineCap='round'; g.lineJoin='round';
  for(let k=1;k<trail.length;k++){
    const a=trail[k-1], b=trail[k];
    const fade=k/trail.length;                 // newest brightest
    g.strokeStyle = 'rgba(255,255,255,'+(0.10+0.35*fade)+')';
    g.lineWidth = 1.5 + 2*fade;
    g.beginPath(); g.moveTo(px(a.x),py(a.y)); g.lineTo(px(b.x),py(b.y)); g.stroke();
  }
  const isKeyE = KEY.has(e.c), isDefE = DEF.has(e.c);
  // event end vector (pass/shot/FK/corner delivery direction + travel). Skip def + no-position.
  if(e.ex!=null && !isDefE && !e.np){
    // gold = set-piece DELIVERY (throw/corner/FK/goal-kick taken) which carries its own
    // code + endPosition. NOT the next open-play touch (that stays white).
    const SP=new Set([115,118,119,134,153,154,157]);
    const sp=SP.has(e.c);
    g.strokeStyle = sp ? getCss('--gold') : 'rgba(255,255,255,.55)';
    g.lineWidth = sp ? 3 : 2;
    if(sp) g.setLineDash([6,4]);
    g.beginPath(); g.moveTo(px(e.x),py(e.y)); g.lineTo(px(e.ex),py(e.ey)); g.stroke();
    g.setLineDash([]);
    arrow(px(e.x),py(e.y),px(e.ex),py(e.ey), sp?getCss('--gold'):'rgba(255,255,255,.6)');
  }
  // DEFENSIVE direction arrow (orange): clearance -> where cleared to;
  // block/tackle/intercept -> incoming ball path (prev event -> this point) = direction stopped.
  if(isDefE && showDef && !e.np){
    let ax,ay,bx,by, ok=false;
    if(e.ex!=null){ ax=e.x; ay=e.y; bx=e.ex; by=e.ey; ok=true; }        // clearance out
    else if(i>0){ const p=EV[i-1]; if(!p.np){ ax=p.x; ay=p.y; bx=e.x; by=e.y;
        ok=(Math.abs(ax-bx)+Math.abs(ay-by))>2; } }                     // incoming blocked path
    if(ok){
      g.strokeStyle='#ff8c42'; g.lineWidth=2.5; g.setLineDash([5,3]);
      g.beginPath(); g.moveTo(px(ax),py(ay)); g.lineTo(px(bx),py(by)); g.stroke();
      g.setLineDash([]);
      arrow(px(ax),py(ay),px(bx),py(by),'#ff8c42');
    }
  }
  // SHOT trajectory: shooter -> goal aim. Blocked shot = solid to block point +
  // dashed block -> intended goal, with a red block marker.
  if(e.sx!=null && !e.np){
    const goal=e.c===114?getCss('--gold'):'#e63b3b';
    if(e.blk && e.bx!=null){
      g.strokeStyle=goal; g.lineWidth=3;                 // shooter -> block (actual travel)
      g.beginPath(); g.moveTo(px(e.x),py(e.y)); g.lineTo(px(e.bx),py(e.by)); g.stroke();
      g.setLineDash([5,4]); g.lineWidth=2;               // block -> intended goal (prevented)
      g.beginPath(); g.moveTo(px(e.bx),py(e.by)); g.lineTo(px(e.sx),py(e.sy)); g.stroke();
      g.setLineDash([]);
      g.strokeStyle='#e63b3b'; g.lineWidth=3; g.lineCap='round';   // red X at block
      const cx=px(e.bx),cy=py(e.by),s=7;

      g.beginPath(); g.moveTo(px(e.x),py(e.y)); g.lineTo(px(e.sx),py(e.sy)); g.stroke();

    }

  // ball
  const col = e.ta===1?getCss('--home'):getCss('--away');
  const isKey = isKeyE;
  const isDef = isDefE;
  g.beginPath(); g.arc(px(e.x),py(e.y), isKey?11:7, 0,7);
  g.fillStyle = e.c===114?getCss('--gold'):col; g.fill();
  g.lineWidth=2; g.strokeStyle='#04121f'; g.stroke();
  if(isKey){

    g.strokeStyle=col; g.globalAlpha=.6; g.stroke(); g.globalAlpha=1;
  }

  if(isDef && showDef){
    const cx=px(e.x), cy=py(e.y);
    g.strokeStyle='#ff8c42'; g.lineWidth=2.5;
    g.beginPath(); g.arc(cx,cy,14,0,7); g.stroke();

    g.fillStyle='#ff8c42'; g.beginPath(); g.arc(cx+11,cy-11,4,0,7); g.fill();
  }
  // label
  g.font='600 15px '+getCss('--sans');
  g.fillStyle=getCss('--ink');
  const lx=Math.min(px(e.x)+18,W-210);
  g.fillText(e.d, lx, py(e.y)-6);
  if(e.p){ g.fillStyle=getCss('--muted'); g.font='13px '+getCss('--sans');

function arrow(x1,y1,x2,y2,color){
  const a=Math.atan2(y2-y1,x2-x1);

  d.innerHTML=`<span class="mn">${e.m}'</span><div><div class="lab">${icon}${e.d}</div>`+
    (e.p?`<div class="pl">${e.p}</div>`:'')+`</div>`;
  d.onclick=()=>{ seekTo(i); start(); };   // jump to event AND resume playback
  log.appendChild(d); rows.push({i,el:d,def:isDef});
});

const sc=document.getElementById('sc'),clk=document.getElementById('clk'),
  per=document.getElementById('per'),seek=document.getElementById('seek'),
  cur=document.getElementById('cur'),playBtn=document.getElementById('play');
seek.max=EV.length-1;
// tick marks on timeline
const ticks=document.getElementById('ticks');
EV.forEach((e,i)=>{
  let cls=null;
  if(e.c===114)cls='tk-goal'; else if(e.c===116||e.c===117)cls='tk-card';
  else if(e.c===121||e.c===122)cls='tk-shot'; else if(e.c===115)cls='tk-corner';
  if(cls){const t=document.createElement('i');t.className=cls;
    t.style.left=(i/(EV.length-1)*100)+'%';t.title=e.m+"' "+e.d;ticks.appendChild(t);}
});
// dwell[i] = display time (match-sec) BEFORE showing event i.
// clamp raw uptime gap to [MIN,MAX]: dead-ball/HT/injury-time gaps compress (no freeze),
// negative/zero gaps (push order != time order) get a minimum step so it never stalls.
const DWELL_MIN=0.25, DWELL_MAX=4;
const dwell=EV.map((e,i)=>{
  if(i===0) return 0;
  const g=EV[i].u-EV[i-1].u;
  return Math.min(DWELL_MAX, Math.max(DWELL_MIN, g));  // g<=0 -> DWELL_MIN
});
let idx=0, playing=false, speed=60, raf=null, acc=0, realtime=false, rtMult=1;
// gap (match-sec) before event i: realtime = true uptime delta (stoppages play full,
// negatives clamped to 0); else dwell-compressed.
function gapAt(i){
  if(realtime) return Math.max(0, EV[i].u - EV[i-1].u);
  return dwell[i];
}

function fmt(m,s){return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
function paint(){
  const e=EV[idx];
  render(idx);
  const [h,a]=e.ss.split('-'); sc.textContent=h+' - '+a;
  clk.textContent=fmt(e.m,e.s); per.textContent=PERIOD[e.st]||e.st;
  seek.value=idx; cur.textContent=(idx+1)+' / '+EV.length;
  // highlight nearest feed row
  let best=null; for(const r of rows){ if(r.i<=idx) best=r; }
  rows.forEach(r=>r.el.classList.toggle('now',r===best));
  if(best) best.el.scrollIntoView({block:'nearest'});
}
function step(ts){
  if(!playing) return;
  if(!step.last) step.last=ts;
  const dt=(ts-step.last)/1000; step.last=ts;
  acc += dt*(realtime?rtMult:speed);      // realtime = rtMult× true match tempo
  let moved=false;
  while(idx<EV.length-1 && gapAt(idx+1) <= acc){
    acc -= gapAt(idx+1); idx++; moved=true;
  }
  // cap leftover to the pending gap so it always stays crossable (no freeze, no overshoot)
  if(idx<EV.length-1) acc=Math.min(acc, gapAt(idx+1));
  if(moved) paint();
  if(idx>=EV.length-1){ stop(); return; }
  raf=requestAnimationFrame(step);
}
function start(){
  if(raf) cancelAnimationFrame(raf);        // no double raf loop
  if(idx>=EV.length-1) idx=0;               // finished -> replay from start
  playing=true; playBtn.textContent='❚❚ Pause'; step.last=0;
  raf=requestAnimationFrame(step);
}
function stop(){ playing=false; playBtn.textContent='▶ Play'; if(raf){cancelAnimationFrame(raf);raf=null;} }
function seekTo(i){ idx=Math.max(0,Math.min(EV.length-1,i)); acc=0; step.last=0; paint(); }

playBtn.onclick=()=>playing?stop():start();
seek.oninput=()=>{ stop(); seekTo(+seek.value); };
const spdSel=document.getElementById('spd');
spdSel.onchange=()=>{
  const [mode,val]=spdSel.value.split(':');
  acc=0;
  if(mode==='rt'){ realtime=true; rtMult=+val; }   // real-time × multiplier (raw gaps)
  else { realtime=false; speed=+val; }             // compressed dwell × speed
};
const defBtn=document.getElementById('def');
defBtn.onclick=()=>{
  showDef=!showDef;
  defBtn.classList.toggle('on', showDef);
  log.classList.toggle('hide-def', !showDef);   // hide defensive rows in feed
  paint();                                       // redraw pitch (crosshair on/off)
};
new MutationObserver(()=>paint()).observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
paint();
</script>

</body>
